services:
  data-service:
    build:
      context: .
      dockerfile: data-service/Dockerfile
    ports:
      - "8000:8000"

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATA_SERVICE_URL=http://data-service:8000/metrics
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - data-service